<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlbaFlow</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    input, button {
      font-size: 16px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }

    input {
      width: 100%;
      margin-bottom: 10px;
    }

    button {
      cursor: pointer;
      border: none;
      background: #222;
      color: white;
      margin: 4px;
    }

    button.secondary {
      background: #666;
    }

    button.danger {
      background: #c0392b;
    }

    button.work {
      background: #1f7a4d;
    }

    button.off {
      background: #b26b00;
    }

    .employee {
      border-top: 1px solid #eee;
      padding-top: 14px;
      margin-top: 14px;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .hidden {
      display: none;
    }

    .small {
      color: #777;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid #eee;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #fafafa;
    }

    .admin-badge {
      display: inline-block;
      padding: 4px 8px;
      background: #222;
      color: white;
      border-radius: 999px;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>AlbaFlow</h1>
    <div class="subtitle">알바 출퇴근 · 직원 관리 · 급여 계산</div>

    <div class="card">
      <h2>직원 출퇴근</h2>
      <div id="employeeList"></div>
    </div>

    <div class="card">
      <h2>관리자 모드</h2>
      <p class="small">관리자 비밀번호를 입력하면 직원 추가, 시급 설정, 기록 확인이 가능합니다.</p>

      <div id="loginBox">
        <input id="adminPassword" type="password" placeholder="관리자 비밀번호 입력" />
        <button onclick="loginAdmin()">관리자 로그인</button>
      </div>

      <div id="adminPanel" class="hidden">
        <span class="admin-badge">관리자 모드</span>
        <button class="secondary" onclick="logoutAdmin()">로그아웃</button>

        <h3>직원 추가</h3>
        <input id="newEmployeeName" placeholder="직원 이름" />
        <input id="newEmployeeWage" type="number" placeholder="시급 예: 10030" />
        <button onclick="addEmployee()">직원 추가</button>

        <h3>직원 목록</h3>
        <div id="adminEmployeeList"></div>

        <h3>출퇴근 기록</h3>
        <table>
          <thead>
            <tr>
              <th>직원</th>
              <th>구분</th>
              <th>시간</th>
            </tr>
          </thead>
          <tbody id="attendanceTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc,
      onSnapshot,
      serverTimestamp,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyALNnysW4QzeUh7JfA-as5lXkFKGFSR8l0",
      authDomain: "albaflow-v1.firebaseapp.com",
      projectId: "albaflow-v1",
      storageBucket: "albaflow-v1.firebasestorage.app",
      messagingSenderId: "646047621774",
      appId: "1:646047621774:web:8b79c8e63b8e9e13d05fdf"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const ADMIN_PASSWORD = "1234";
    let isAdmin = false;
    let employees = [];

    window.loginAdmin = function () {
      const pw = document.getElementById("adminPassword").value;
      if (pw === ADMIN_PASSWORD) {
        isAdmin = true;
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("adminPanel").classList.remove("hidden");
        renderEmployees();
      } else {
        alert("비밀번호가 맞지 않습니다.");
      }
    };

    window.logoutAdmin = function () {
      isAdmin = false;
      document.getElementById("loginBox").classList.remove("hidden");
      document.getElementById("adminPanel").classList.add("hidden");
      document.getElementById("adminPassword").value = "";
    };

    window.addEmployee = async function () {
      const name = document.getElementById("newEmployeeName").value.trim();
      const wage = Number(document.getElementById("newEmployeeWage").value);

      if (!name) {
        alert("직원 이름을 입력하세요.");
        return;
      }

      if (!wage || wage <= 0) {
        alert("시급을 입력하세요.");
        return;
      }

      await addDoc(collection(db, "employees"), {
        name,
        wage,
        createdAt: serverTimestamp()
      });

      document.getElementById("newEmployeeName").value = "";
      document.getElementById("newEmployeeWage").value = "";
      alert("직원이 추가되었습니다.");
    };

    window.deleteEmployee = async function (id) {
      if (!confirm("이 직원을 삭제할까요?")) return;
      await deleteDoc(doc(db, "employees", id));
    };

    window.saveAttendance = async function (employeeName, type) {
      await addDoc(collection(db, "attendance"), {
        employeeName,
        type,
        createdAt: serverTimestamp(),
        timeText: new Date().toLocaleString("ko-KR")
      });

      alert(employeeName + " " + type + " 기록 완료");
    };

    function renderEmployees() {
      const employeeList = document.getElementById("employeeList");
      const adminEmployeeList = document.getElementById("adminEmployeeList");

      employeeList.innerHTML = "";
      adminEmployeeList.innerHTML = "";

      if (employees.length === 0) {
        employeeList.innerHTML = "<p class='small'>아직 등록된 직원이 없습니다. 관리자 모드에서 직원을 추가하세요.</p>";
        return;
      }

      employees.forEach(emp => {
        const div = document.createElement("div");
        div.className = "employee";
        div.innerHTML = `
          <strong>${emp.name}</strong>
          <div class="row">
            <button class="work" onclick="saveAttendance('${emp.name}', '출근')">출근</button>
            <button class="off" onclick="saveAttendance('${emp.name}', '퇴근')">퇴근</button>
          </div>
        `;
        employeeList.appendChild(div);

        if (isAdmin) {
          const adminDiv = document.createElement("div");
          adminDiv.className = "employee";
          adminDiv.innerHTML = `
            <strong>${emp.name}</strong>
            <p class="small">시급: ${emp.wage.toLocaleString()}원</p>
            <button class="danger" onclick="deleteEmployee('${emp.id}')">삭제</button>
          `;
          adminEmployeeList.appendChild(adminDiv);
        }
      });
    }

    onSnapshot(collection(db, "employees"), snapshot => {
      employees = [];
      snapshot.forEach(docSnap => {
        employees.push({
          id: docSnap.id,
          ...docSnap.data()
        });
      });
      renderEmployees();
    });

    const attendanceQuery = query(
      collection(db, "attendance"),
      orderBy("createdAt", "desc")
    );

    onSnapshot(attendanceQuery, snapshot => {
      const tbody = document.getElementById("attendanceTable");
      tbody.innerHTML = "";

      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${data.employeeName || ""}</td>
          <td>${data.type || ""}</td>
          <td>${data.timeText || data.time || ""}</td>
        `;

        tbody.appendChild(tr);
      });
    });
  </script>
</body>
</html>
