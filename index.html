<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlbaFlow</title>

  <style>
    body{font-family:sans-serif;background:#f5f5f5;padding:40px;}
    .box{max-width:450px;margin:auto;background:white;padding:30px;border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
    h1{text-align:center;margin-bottom:25px;}
    input{width:100%;padding:15px;font-size:18px;margin-bottom:20px;box-sizing:border-box;border-radius:10px;border:1px solid #ddd;}
    button{width:100%;padding:15px;font-size:18px;border:none;border-radius:12px;margin-bottom:10px;cursor:pointer;}
    .start{background:#4CAF50;color:white;}
    .end{background:#f44336;color:white;}
    h2{margin-top:30px;}
    .record{background:#eee;padding:15px;border-radius:12px;margin-bottom:10px;}
    .working{background:#e8f5e9;}
  </style>
</head>

<body>
  <div class="box">
    <h1>AlbaFlow</h1>

    <input type="text" id="name" placeholder="직원 이름 입력">

    <button class="start" onclick="checkIn()">출근하기</button>
    <button class="end" onclick="checkOut()">퇴근하기</button>

    <h2>오늘 기록</h2>
    <div id="list"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      serverTimestamp,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyALNnysW4QzeUh7JfA-as5lXkFKGFSR8l0",
      authDomain: "albaflow-v1.firebaseapp.com",
      projectId: "albaflow-v1",
      storageBucket: "albaflow-v1.firebasestorage.app",
      messagingSenderId: "646047621774",
      appId: "1:646047621774:web:8b79c8e63b8e9e13d05fdf"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let workingPeople = {};

    function getTodayKey(){
      const d = new Date();
      return d.getFullYear() + "-" +
        String(d.getMonth() + 1).padStart(2, "0") + "-" +
        String(d.getDate()).padStart(2, "0");
    }

    async function loadAttendance(){
      const q = query(
        collection(db, "attendance"),
        orderBy("createdAt", "asc")
      );

      const querySnapshot = await getDocs(q);

      workingPeople = {};
      let html = "";
      const today = getTodayKey();

      querySnapshot.forEach((doc) => {
        const data = doc.data();

        if(data.date !== today) return;

        if(data.type === "출근"){
          workingPeople[data.employeeName] = data;
        }

        if(data.type === "퇴근"){
          delete workingPeople[data.employeeName];
        }

        html += `
          <div class="record">
            <strong>${data.employeeName}</strong><br>
            ${data.type}<br>
            시간 : ${data.time || "-"}<br>
            근무시간 : ${data.workedHours || "-"}
          </div>
        `;
      });

      const workingNames = Object.keys(workingPeople);

      if(workingNames.length > 0){
        html += `<h2>현재 출근중</h2>`;

        workingNames.forEach((name) => {
          html += `
            <div class="record working">
              ${name} 출근중
            </div>
          `;
        });
      }

      document.getElementById("list").innerHTML = html;
    }

    async function checkIn(){
      await loadAttendance();

      const name = document.getElementById("name").value.trim();

      if(!name){
        alert("이름 입력");
        return;
      }

      if(workingPeople[name]){
        alert("이미 출근중입니다");
        return;
      }

      const now = new Date();

      await addDoc(collection(db, "attendance"), {
        employeeName: name,
        type: "출근",
        date: getTodayKey(),
        time: now.toLocaleTimeString(),
        checkInMillis: now.getTime(),
        createdAt: serverTimestamp()
      });

      alert(name + " 출근 완료");
      loadAttendance();
    }

    async function checkOut(){
      await loadAttendance();

      const name = document.getElementById("name").value.trim();

      if(!name){
        alert("이름 입력");
        return;
      }

      if(!workingPeople[name]){
        alert("출근 기록 없음");
        return;
      }

      const now = new Date();
      const checkInMillis = workingPeople[name].checkInMillis;

      const diff = (now.getTime() - checkInMillis) / 1000 / 60 / 60;
      const workHours = diff.toFixed(2);

      await addDoc(collection(db, "attendance"), {
        employeeName: name,
        type: "퇴근",
        date: getTodayKey(),
        time: now.toLocaleTimeString(),
        workedHours: workHours,
        createdAt: serverTimestamp()
      });

      alert(name + " 퇴근 완료");
      loadAttendance();
    }

    loadAttendance();

    window.checkIn = checkIn;
    window.checkOut = checkOut;
  </script>
</body>
</html>
